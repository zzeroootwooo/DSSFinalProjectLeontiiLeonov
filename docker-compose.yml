services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: todos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - todo_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todos"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3087:3087"
    environment:
      ASPNETCORE_URLS: http://+:3087
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=todos;Username=postgres;Password=postgres
      Jwt__Key: super_secret_dev_key_change_me
      Jwt__Issuer: todoapi
    depends_on:
      db:
        condition: service_healthy

volumes:
  todo_db_data:
